<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MLMUPC Administrative Browser</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans p-6">
  <div class="max-w-6xl mx-auto bg-white shadow-lg rounded-xl p-6 space-y-6">

    <h1 class="text-3xl font-bold text-blue-700">
      MLMUPC Administrative
    </h1>

    <div id="stats" class="grid grid-cols-4 gap-4 mt-4 text-center">
    <div class="bg-blue-100 p-3 rounded">
      <div class="font-bold" id="stat1">–</div>
      <div>Provinces</div>
    </div>
    <div class="bg-green-100 p-3 rounded">
      <div class="font-bold" id="stat2">–</div>
      <div>Districts</div>
    </div>
    <div class="bg-yellow-100 p-3 rounded">
      <div class="font-bold" id="stat3">–</div>
      <div>Communes</div>
    </div>
    <div class="bg-red-100 p-3 rounded">
      <div class="font-bold" id="stat4">–</div>
      <div>Villages</div>
    </div>
  </div>
  
    <div class="grid grid-cols-4 gap-4">
      <select id="province" class="border p-2 rounded"></select>
      <select id="district" class="border p-2 rounded"></select>
      <select id="commune" class="border p-2 rounded"></select>
      <select id="village" class="border p-2 rounded"></select>
    </div>

    <button onclick="showSelected()" class="bg-blue-600 text-white px-4 py-2 rounded">
      Show Selected Data
    </button>

    <div class="flex gap-4">
      <input id="code" class="border p-2 flex-1 rounded" placeholder="01020101">
      <button onclick="searchByCode()" class="bg-green-600 text-white px-4 py-2 rounded">
        Search Code
      </button>
    </div>

    <div class="flex gap-4">
      <input id="nameSearch" class="border p-2 flex-1 rounded" placeholder="Ou / អូរ / Banteay">
      <button onclick="searchByName()" class="bg-purple-600 text-white px-4 py-2 rounded">
        Search Name
      </button>
    </div>

    <table class="w-full border border-gray-300 mt-6">
      <thead class="bg-blue-600 text-white">
        <tr>
          <th class="p-2 border">Level</th>
          <th class="p-2 border">Code</th>
          <th class="p-2 border">Khmer</th>
          <th class="p-2 border">English</th>
        </tr>
      </thead>
      <tbody id="resultBody">
        <tr>
          <td colspan="4" class="text-center p-4 text-gray-500">No results</td>
        </tr>
      </tbody>
    </table>

  </div>

  <script src="/static/app.js"></script>
</body>

</html>
